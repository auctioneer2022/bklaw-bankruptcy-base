site_name: 破产法律知识库
site_url: https://auctioneer2022.github.io/bankruptcy-knowledge-base/
site_description: 全面系统的破产法律知识库，涵盖法律法规、司法解释、典型案例、实务指南等内容
site_author: auctioneer2022
copyright: Copyright &copy; 2025 auctioneer2022

strict: true

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/auctioneer2022

